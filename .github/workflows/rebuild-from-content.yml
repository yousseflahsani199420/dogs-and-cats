name: Rebuild Site From Content Push

on:
  push:
    branches:
      - main
      - master
    paths:
      - "content/posts/*.json"
  workflow_dispatch:

concurrency:
  group: petzone-rebuild-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild-static-site:
    name: Rebuild static site outputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Rebuild static outputs
        run: npm run build
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      - name: Commit rebuilt files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data posts categories tags sitemap.xml news-sitemap.xml robots.txt
          git diff --cached --quiet && echo "No generated file changes to commit" && exit 0
          git commit -m "chore(site): rebuild static outputs from content push"
          git push
