name: Daily PetZone Post

on:
  schedule:
    - cron: "10 6 * * *"
  workflow_dispatch:

concurrency:
  group: petzone-daily-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-daily-post:
    name: Generate and publish daily articles
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
      DAILY_POSTS_PER_CATEGORY: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Bootstrap indexes if repository is empty
        run: npm run bootstrap

      - name: Publish daily article batch
        id: publish
        run: |
          set -eo pipefail
          if [ -z "$AI_API_KEY" ]; then
            echo "AI_API_KEY is not configured in GitHub Actions secrets." >&2
            exit 1
          fi
          npm run publish:daily 2>&1 | tee daily-post.log
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          AI_TIMEOUT_MS: ${{ secrets.AI_TIMEOUT_MS }}
          AI_RETRY_ATTEMPTS: ${{ secrets.AI_RETRY_ATTEMPTS }}

      - name: Rebuild site indexes after publish
        run: npm run build 2>&1 | tee -a daily-post.log
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No content changes to commit" && exit 0
          git commit -m "chore(content): publish daily PetZone batch"
          git push

      - name: Upload automation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-log
          path: daily-post.log
