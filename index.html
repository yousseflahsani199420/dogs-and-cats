<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetZone News | Cats & Dogs Daily</title>
    <meta
      name="description"
      content="PetZone News is a fast pets news platform covering cats and dogs with practical care guides, training updates, health explainers, and trending pet stories."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PetZone News | Cats & Dogs Daily" />
    <meta
      property="og:description"
      content="Breaking pet care news, dense article coverage, category hubs, and fast cat and dog guides built for real-world publishing."
    />
    <meta property="og:image" content="assets/images/og-default.svg" />
    <meta property="og:url" content="https://yousseflahsani199420.github.io/dogs-and-cats/" />
    <meta property="og:site_name" content="PetZone" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PetZone News | Cats & Dogs Daily" />
    <meta
      name="twitter:description"
      content="Breaking pet care news, dense article coverage, category hubs, and fast cat and dog guides built for real-world publishing."
    />
    <link rel="canonical" href="https://yousseflahsani199420.github.io/dogs-and-cats/" />
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="home">
    <div data-site-header></div>
    <main class="page-shell">
      <section class="breaking-wrapper">
        <div class="site-shell">
          <div class="breaking-strip">
            <span class="breaking-label">Breaking</span>
            <div id="breaking-ticker" class="breaking-ticker">Loading the latest pet headlines...</div>
          </div>
        </div>
      </section>

      <section class="site-shell section-tight">
        <div id="home-hero-grid" class="hero-news-grid news-loading">
          <div class="loading-card lead-loading"></div>
          <div class="hero-side-grid">
            <div class="loading-card compact-loading"></div>
            <div class="loading-card compact-loading"></div>
            <div class="loading-card compact-loading"></div>
            <div class="loading-card compact-loading"></div>
          </div>
        </div>
      </section>

      <section class="site-shell section-tight">
        <div class="content-with-sidebar">
          <div class="primary-column">
            <section class="home-top-layout">
              <div>
                <div class="section-header">
                  <h2 class="section-title">Latest Coverage</h2>
                  <a href="search.html" class="section-link">View all</a>
                </div>
                <div id="latest-article-grid" class="news-grid tight-grid news-loading">
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                  <div class="loading-card grid-loading"></div>
                </div>
              </div>

              <section class="headline-panel">
                <div class="section-header compact-header">
                  <h2 class="section-title">More Headlines</h2>
                </div>
                <div id="home-headline-stream" class="headline-stack news-loading">
                  <div class="loading-card sidebar-loading"></div>
                  <div class="loading-card sidebar-loading"></div>
                  <div class="loading-card sidebar-loading"></div>
                  <div class="loading-card sidebar-loading"></div>
                  <div class="loading-card sidebar-loading"></div>
                  <div class="loading-card sidebar-loading"></div>
                </div>
              </section>
            </section>

            <div class="category-split-grid">
              <section class="category-news-block">
                <div class="section-header">
                  <h2 class="section-title">Cats</h2>
                  <a href="categories/cats/" class="section-link">More cats</a>
                </div>
                <div id="cats-category-block" class="dense-list news-loading">
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                </div>
              </section>

              <section class="category-news-block">
                <div class="section-header">
                  <h2 class="section-title">Dogs</h2>
                  <a href="categories/dogs/" class="section-link">More dogs</a>
                </div>
                <div id="dogs-category-block" class="dense-list news-loading">
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                  <div class="loading-card list-loading"></div>
                </div>
              </section>
            </div>
          </div>

          <aside class="sidebar-column">
            <section class="sidebar-box">
              <div class="section-header compact-header">
                <h2 class="section-title">Trending</h2>
              </div>
              <div id="trending-list" class="sidebar-list news-loading">
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
              </div>
            </section>

            <section class="sidebar-box">
              <div class="section-header compact-header">
                <h2 class="section-title">Popular</h2>
              </div>
              <div id="popular-list" class="sidebar-list news-loading">
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
              </div>
            </section>

            <section class="sidebar-box newsletter-box">
              <p class="eyebrow">Newsletter</p>
              <h2 class="section-title small-title">Get new cat and dog stories every week</h2>
              <p class="muted-copy">This demo stores subscribers locally until you connect an email provider later.</p>
              <form data-newsletter-form class="newsletter-form">
                <input type="email" name="email" class="text-input" placeholder="Email address" required />
                <button type="submit" class="button button-primary button-block">Subscribe</button>
              </form>
            </section>

            <section class="sidebar-box">
              <div class="section-header compact-header">
                <h2 class="section-title">Topics</h2>
              </div>
              <div id="home-spotlight-tags" class="spotlight-tag-row news-loading">
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
                <div class="loading-card sidebar-loading"></div>
              </div>
            </section>
          </aside>
        </div>
      </section>
    </main>
    <div data-site-footer></div>
    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
